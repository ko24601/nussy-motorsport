<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Nussy Motorsport</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #AAFF00;
    --neon-dim: #7acc00;
    --neon-glow: rgba(170,255,0,0.35);
    --black: #080808;
    --dark: #0f0f0f;
    --card: #141414;
    --border: #1f1f1f;
    --text: #e8e8e8;
    --muted: #666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 40px;
  }
  #login-screen.hidden { display: none; }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .login-logo img { width: 60px; height: 60px; object-fit: contain; }
  .login-logo span {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .login-box {
    background: var(--card);
    border: 1px solid rgba(170,255,0,0.2);
    padding: 40px;
    width: 360px;
    position: relative;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--neon);
    box-shadow: 0 0 16px var(--neon-glow);
  }
  .login-box h2 {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--neon);
    margin-bottom: 6px;
  }
  .login-box p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .form-group label { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .form-group input {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-group input:focus { border-color: rgba(170,255,0,0.5); }
  .login-error { font-size: 12px; color: #ff4444; letter-spacing: 1px; margin-bottom: 12px; display: none; }
  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary { background: var(--neon); color: var(--black); clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
  .btn-primary:hover { background: #fff; }
  .btn-ghost { background: transparent; color: var(--neon); border: 1px solid rgba(170,255,0,0.3); clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
  .btn-ghost:hover { border-color: var(--neon); box-shadow: 0 0 12px var(--neon-glow); }
  .btn-danger { background: rgba(255,60,60,0.1); color: #ff5555; border: 1px solid rgba(255,60,60,0.2); clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
  .btn-danger:hover { background: rgba(255,60,60,0.2); }

  /* ── ADMIN LAYOUT ── */
  #admin-screen { display: none; min-height: 100vh; }
  #admin-screen.visible { display: block; }

  .admin-topbar {
    background: rgba(8,8,8,0.95);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .admin-topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .admin-topbar-left img { width: 32px; height: 32px; object-fit: contain; }
  .admin-topbar-left span {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--neon);
  }
  .admin-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--black);
    background: var(--neon);
    padding: 2px 8px;
  }
  .admin-topbar-right { display: flex; align-items: center; gap: 16px; }
  .admin-user { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  .admin-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px;
  }

  /* ── STAT BAR ── */
  .admin-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 40px;
  }
  .admin-stat {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .admin-stat .s-icon {
    font-size: 24px;
    width: 44px; height: 44px;
    background: rgba(170,255,0,0.06);
    border: 1px solid rgba(170,255,0,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .admin-stat .s-num {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: var(--neon);
    line-height: 1;
  }
  .admin-stat .s-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── PANELS ── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .panel-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--neon);
  }
  .panel-body { padding: 28px; }

  /* ── FORM GRID ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-grid .full { grid-column: 1/-1; }
  .form-group select {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .form-group select:focus { border-color: rgba(170,255,0,0.5); }
  .form-group select option { background: var(--dark); }
  .form-group textarea {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    width: 100%;
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.2s;
  }
  .form-group textarea:focus { border-color: rgba(170,255,0,0.5); }
  .form-actions { display: flex; gap: 12px; margin-top: 20px; }

  /* ── TABLE ── */
  .admin-table { width: 100%; border-collapse: collapse; }
  .admin-table th {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .admin-table td {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(31,31,31,0.5);
    font-size: 14px;
    vertical-align: middle;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: rgba(170,255,0,0.02); }
  .admin-table .td-title { color: #fff; font-weight: 600; max-width: 260px; }
  .admin-table .td-muted { color: var(--muted); font-size: 12px; letter-spacing: 1px; }
  .tag-pill {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid;
  }
  .tag-pill.RESULTS      { color: var(--neon); border-color: rgba(170,255,0,0.3); background: rgba(170,255,0,0.06); }
  .tag-pill.ANNOUNCEMENT { color: #FFD700; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.06); }
  .tag-pill.DRIVER\ NEWS { color: #00cfff; border-color: rgba(0,207,255,0.3); background: rgba(0,207,255,0.06); }
  .tag-pill.TECHNICAL    { color: #ff7c00; border-color: rgba(255,124,0,0.3); background: rgba(255,124,0,0.06); }
  .tag-pill.LEAGUE\ NEWS { color: #cc44ff; border-color: rgba(204,68,255,0.3); background: rgba(204,68,255,0.06); }

  .role-pill {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid;
  }
  .role-pill.driver     { color: var(--neon); border-color: rgba(170,255,0,0.3); background: rgba(170,255,0,0.06); }
  .role-pill.reserve    { color: #00cfff; border-color: rgba(0,207,255,0.3); background: rgba(0,207,255,0.06); }
  .role-pill.founder    { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .role-pill.developer  { color: #ff7c00; border-color: rgba(255,124,0,0.3); background: rgba(255,124,0,0.06); }
  .role-pill.management { color: #FFD700; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.06); }
  .role-pill.staff      { color: #cc44ff; border-color: rgba(204,68,255,0.3); background: rgba(204,68,255,0.06); }

  .empty-row { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }

  /* ── NOTIFICATION ── */
  #notif {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--card);
    border: 1px solid var(--neon);
    border-left: 3px solid var(--neon);
    padding: 14px 20px;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--text);
    z-index: 9998;
    display: none;
    animation: slideIn 0.3s ease;
    box-shadow: 0 0 20px rgba(170,255,0,0.1);
  }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .admin-body { padding: 20px; }
    .form-grid { grid-template-columns: 1fr; }
    .admin-stats { grid-template-columns: 1fr; }
    .admin-topbar { padding: 0 20px; }
    .admin-table th:nth-child(3), .admin-table td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">
    <img src="logo.png" alt="Nussy Motorsport">
    <span>Admin Portal</span>
  </div>
  <div class="login-box">
    <h2>Admin Access</h2>
    <p>Sign in to manage the site</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="admin-email" placeholder="admin@nussymotorsport.de" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div class="form-group" style="margin-bottom:8px;">
      <label>Password</label>
      <input type="password" id="admin-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <p class="login-error" id="login-error">⚠ Incorrect credentials</p>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:40px;" onclick="tryLogin()">Authenticate</button>
  </div>
</div>

<!-- NOTIFICATION -->
<div id="notif"></div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <!-- TOP BAR -->
  <div class="admin-topbar">
    <div class="admin-topbar-left">
      <img src="logo.png" alt="Logo">
      <span>NUSSY MOTORSPORT</span>
      <div class="admin-badge">Admin</div>
    </div>
    <div class="admin-topbar-right">
      <span class="admin-user" id="admin-user-label"></span>
      <a href="index.html" class="btn btn-ghost" style="font-size:11px;padding:8px 16px;">← Back to Site</a>
      <button class="btn btn-danger" style="font-size:11px;padding:8px 16px;" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- STATS -->
    <div class="admin-stats">
      <div class="admin-stat">
        <div class="s-icon">📰</div>
        <div>
          <div class="s-num" id="stat-news">0</div>
          <div class="s-label">News Posts</div>
        </div>
      </div>
      <div class="admin-stat">
        <div class="s-icon">👤</div>
        <div>
          <div class="s-num" id="stat-roster">0</div>
          <div class="s-label">Roster Members</div>
        </div>
      </div>
      <div class="admin-stat">
        <div class="s-icon">✅</div>
        <div>
          <div class="s-num" style="color:var(--neon);font-size:18px;">LIVE</div>
          <div class="s-label">Site Status</div>
        </div>
      </div>
    </div>

    <!-- POST NEWS -->
    <div class="panel">
      <div class="panel-header">
        <h2>📡 Post News</h2>
      </div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Headline</label>
            <input type="text" id="news-title" placeholder="e.g. Race 5 Results — Monza Sprint" maxlength="120">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="news-tag">
              <option value="RESULTS">Results</option>
              <option value="ANNOUNCEMENT">Announcement</option>
              <option value="DRIVER NEWS">Driver News</option>
              <option value="TECHNICAL">Technical</option>
              <option value="LEAGUE NEWS">League News</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Content</label>
            <textarea id="news-body" placeholder="Write your news update here..." maxlength="1000"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="postNews()">⬆ Publish</button>
          <button class="btn btn-ghost" onclick="clearNewsForm()">Clear</button>
        </div>
      </div>
    </div>

    <!-- NEWS LIST -->
    <div class="panel">
      <div class="panel-header">
        <h2>📋 Published News</h2>
      </div>
      <div class="panel-body" style="padding:0;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Headline</th>
              <th>Category</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="news-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ADD ROSTER -->
    <div class="panel">
      <div class="panel-header">
        <h2>👤 Add Roster Member</h2>
      </div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Name / Gamertag</label>
            <input type="text" id="roster-name" placeholder="e.g. Xachary Zinsmaster" maxlength="40">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="roster-role">
              <option value="driver">Race Driver</option>
              <option value="reserve">Reserve Driver</option>
              <option value="founder">Founder / CEO</option>
              <option value="developer">Developer</option>
              <option value="management">Management</option>
              <option value="staff">Staff</option>
            </select>
          </div>
          <div class="form-group">
            <label>Car Number (optional)</label>
            <input type="text" id="roster-number" placeholder="e.g. 28" maxlength="4">
          </div>
          <div class="form-group">
            <label>Nationality (optional)</label>
            <input type="text" id="roster-nation" placeholder="e.g. 🇩🇪 GER" maxlength="20">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="addRosterMember()">⬆ Add Member</button>
          <button class="btn btn-ghost" onclick="clearRosterForm()">Clear</button>
        </div>
      </div>
    </div>

    <!-- ROSTER LIST -->
    <div class="panel">
      <div class="panel-header">
        <h2>🏁 Current Roster</h2>
      </div>
      <div class="panel-body" style="padding:0;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Role</th>
              <th>Number</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="roster-table-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA0zb71MZOh5Ew8jVkGV2iR37xcDSkxwrE",
    authDomain: "nussy-motorsports.firebaseapp.com",
    projectId: "nussy-motorsports",
    storageBucket: "nussy-motorsports.appspot.com",
    messagingSenderId: "961500849466",
    appId: "1:961500849466:web:placeholder"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const STORAGE_KEY = 'nussy_news';
  const ROSTER_KEY  = 'nussy_roster';
  const ROLE_LABELS = {
    driver: 'Race Driver', reserve: 'Reserve Driver',
    founder: 'Founder / CEO', developer: 'Developer',
    management: 'Management', staff: 'Staff'
  };

  let news   = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let roster = JSON.parse(localStorage.getItem(ROSTER_KEY)  || '[]');

  // ── AUTH STATE ──
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('admin-screen').classList.add('visible');
      document.getElementById('admin-user-label').textContent = user.email;
      renderAll();
    } else {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('admin-screen').classList.remove('visible');
    }
  });

  // ── LOGIN ──
  window.tryLogin = async function() {
    const email = document.getElementById('admin-email').value.trim();
    const pw    = document.getElementById('admin-password').value;
    const err   = document.getElementById('login-error');
    err.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, pw);
    } catch(e) {
      err.style.display = 'block';
      document.getElementById('admin-password').value = '';
    }
  }

  window.logout = async function() {
    await signOut(auth);
  }

  // ── RENDER ──
  function renderAll() {
    renderNews();
    renderRoster();
    document.getElementById('stat-news').textContent   = news.length;
    document.getElementById('stat-roster').textContent = roster.length;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderNews() {
    const tbody = document.getElementById('news-table-body');
    if (news.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No news posts yet</td></tr>';
      return;
    }
    tbody.innerHTML = news.map(item => `
      <tr>
        <td class="td-title">${escHtml(item.title)}</td>
        <td><span class="tag-pill ${escHtml(item.tag)}">${escHtml(item.tag)}</span></td>
        <td class="td-muted">${escHtml(item.date)}</td>
        <td><button class="btn btn-danger" style="font-size:11px;padding:6px 14px;" onclick="deleteNews(${item.id})">✕ Delete</button></td>
      </tr>
    `).join('');
  }

  function renderRoster() {
    const tbody = document.getElementById('roster-table-body');
    if (roster.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No roster members yet</td></tr>';
      return;
    }
    tbody.innerHTML = roster.map(m => `
      <tr>
        <td class="td-title">${escHtml(m.name)}${m.nation ? `<span style="color:var(--muted);font-size:12px;margin-left:8px;">${escHtml(m.nation)}</span>` : ''}</td>
        <td><span class="role-pill ${escHtml(m.role)}">${escHtml(ROLE_LABELS[m.role] || m.role)}</span></td>
        <td class="td-muted">${m.number ? '#' + escHtml(m.number) : '—'}</td>
        <td><button class="btn btn-danger" style="font-size:11px;padding:6px 14px;" onclick="deleteRosterMember(${m.id})">✕ Remove</button></td>
      </tr>
    `).join('');
  }

  // ── NEWS ──
  window.postNews = function() {
    const title = document.getElementById('news-title').value.trim();
    const body  = document.getElementById('news-body').value.trim();
    const tag   = document.getElementById('news-tag').value;
    if (!title || !body) { notify('⚠ Title and content required'); return; }
    news.unshift({ id: Date.now(), title, body, tag, date: new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }), author: 'Admin' });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(news));
    renderAll();
    clearNewsForm();
    notify('✓ News published!');
  }

  window.deleteNews = function(id) {
    news = news.filter(n => n.id !== id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(news));
    renderAll();
    notify('Post deleted');
  }

  window.clearNewsForm = function() {
    document.getElementById('news-title').value = '';
    document.getElementById('news-body').value  = '';
  }

  // ── ROSTER ──
  window.addRosterMember = function() {
    const name   = document.getElementById('roster-name').value.trim();
    const role   = document.getElementById('roster-role').value;
    const number = document.getElementById('roster-number').value.trim();
    const nation = document.getElementById('roster-nation').value.trim();
    if (!name) { notify('⚠ Name is required'); return; }
    roster.push({ id: Date.now(), name, role, number, nation });
    localStorage.setItem(ROSTER_KEY, JSON.stringify(roster));
    renderAll();
    clearRosterForm();
    notify('✓ Member added!');
  }

  window.deleteRosterMember = function(id) {
    roster = roster.filter(m => m.id !== id);
    localStorage.setItem(ROSTER_KEY, JSON.stringify(roster));
    renderAll();
    notify('Member removed');
  }

  window.clearRosterForm = function() {
    document.getElementById('roster-name').value   = '';
    document.getElementById('roster-number').value = '';
    document.getElementById('roster-nation').value = '';
  }

  // ── NOTIFY ──
  function notify(msg) {
    const el = document.getElementById('notif');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(window._notifTimer);
    window._notifTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
